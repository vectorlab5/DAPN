# DAPN Configuration Template
# Copy this file and modify settings as needed

name: "dapn_experiment"
output_dir: "./outputs"

# Model architecture
model:
  backbone: "resnet12"
  feature_dim: 512
  invariant_dim: 256
  specific_dim: 256
  discriminator_hidden: 256
  num_domains: 4
  gnn_hidden: 256
  gnn_layers: 2
  graph_threshold: 0.5
  dropout: 0.1

# Training settings
training:
  # Episode configuration
  n_way: 5
  k_shot: 1
  n_query: 15
  
  # Schedule
  epochs: 100
  episodes_per_epoch: 100
  batch_size: 4
  
  # Optimization
  learning_rate: 0.0001
  weight_decay: 0.0001
  lr_decay_epochs: [60, 80]
  lr_decay_factor: 0.1
  
  # Loss weights - tuned based on ablation studies
  lambda_adv: 0.5      # Adversarial domain adaptation
  lambda_dis: 0.3      # Feature disentanglement
  lambda_recon: 0.2    # Reconstruction
  alpha_graph: 0.1     # Graph refinement
  
  # Gradient reversal scaling
  grl_lambda: 1.0
  
  # Reproducibility
  seed: 42
  
  # Data loading
  num_workers: 4
  pin_memory: true

# Evaluation settings
evaluation:
  n_episodes: 600
  confidence_level: 0.95
  cross_domain_eval: true
  ablation_components:
    - "full"
    - "no_domain_adapt"
    - "no_disentangle"
    - "no_gnn"
    - "baseline"

# Dataset
data:
  dataset: "ich_benchmark"
  data_root: "./data"
  image_size: 84
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  use_augmentation: true
  domain_names:
    - "northern"
    - "southern"
    - "eastern"
    - "western"

# Logging
log_interval: 10
save_interval: 10
resume_from: null
